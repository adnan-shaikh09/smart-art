worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Add video MIME types
    types {
        video/mp4         mp4;
        video/webm        webm;
        video/ogg         ogv;
        video/quicktime   mov;
        video/x-msvideo   avi;
        video/x-matroska  mkv;
        video/3gpp        3gp;
    }

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # NO upload size limit — allow videos of any size
    client_max_body_size 0;

    # Increase timeouts for large video uploads
    proxy_connect_timeout   300s;
    proxy_send_timeout      300s;
    proxy_read_timeout      300s;
    client_body_timeout     300s;

    # Buffer sizes for video streaming
    proxy_buffer_size        128k;
    proxy_buffers            8 256k;
    proxy_busy_buffers_size  256k;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_disable "msie6";

    upstream backend  { server backend:5000;  keepalive 32; }
    upstream frontend { server frontend:80;   keepalive 32; }

    server {
        listen 80;
        server_name _;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;

        # API routes
        location /api/ {
            proxy_pass http://backend/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            client_max_body_size 0;
        }

        # Video & media files — served directly by nginx with range support
        location /uploads/ {
            alias /var/www/uploads/;

            # Enable byte-range requests (essential for video seeking)
            add_header Accept-Ranges bytes;
            add_header Cache-Control "public, max-age=2592000";

            # CORS for video
            add_header Access-Control-Allow-Origin *;

            # Serve with proper caching
            expires 30d;

            # Allow large video files
            client_max_body_size 0;
        }

        # React SPA
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
